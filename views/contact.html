<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/contact.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/logo.svg" type="image/png">
    <title>Moto Zone</title>
</head>
<body>
 
    <!-- MENU HEADER -->

    <header>
        <img class="logo" src="../assets/logo.svg" alt="logo">
        <section class="menu">
            <a href="../index.html">Principal</a>
            <a href="motorcycles.html">Motocicletas</a>
            <a href="accesories.html">Accesorios</a>
            <a href="us.html" >Nosotros</a>
            <a href="contact.html" class="contact">Contáctanos</a>
        </section>
    </header>
 
    <!-- Division: imagen + formulario -->
    <div class="page">
 
        <!-- Izquierda: imagen -->
        <div class="panel-image">
            <img
                src="https://i.pinimg.com/736x/5e/7e/66/5e7e66ed665aaa373d85da2cb3b00bcc.jpg"
                alt="Moto Zone"
            >
            <div class="panel-image-label">
                <h2>HABLEMOS<br>DE <span>MOTOS</span></h2>
                <p>Estamos para ayudarte</p>
            </div>
        </div>
 
        <!-- Derecha: formulario -->
        <div class="panel-form">
            <p class="form-eyebrow">Contáctanos</p>
            <h1 class="form-title">ESCRÍBE<span>NOS</span></h1>
            <p class="form-subtitle">Resolvemos tus dudas sobre productos, repuestos o servicios.<br>Te respondemos en menos de 24 horas.</p>
            <div class="form-divider"></div>
 
            <div class="form-grid">
 
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre">
                </div>
 
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Tu apellido">
                </div>
 
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com">
                </div>
 
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" placeholder="+57 300 000 0000">
                </div>
 
                <div class="form-group full">
                    <label for="asunto">Asunto</label>
                    <select id="asunto">
                        <option value="" disabled selected>Selecciona un tema</option>
                        <option>Consulta sobre motocicletas</option>
                        <option>Accesorios y repuestos</option>
                        <option>Servicio técnico</option>
                        <option>Garantías</option>
                        <option>Otro</option>
                    </select>
                </div>
 
                <div class="form-group full">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" placeholder="Cuéntanos en qué podemos ayudarte..."></textarea>
                </div>
 
            </div>
 
            <div class="btn-submit">
                <button type="button">Enviar mensaje</button>
                <span class="btn-note">Te respondemos en &lt; 24 h</span>
            </div>
        </div>
 
    </div>
 
</body>
</html>
</html>
