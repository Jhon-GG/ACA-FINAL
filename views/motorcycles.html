<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/motorcycles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/logo.svg" type="image/png">
    <title>Moto Zone</title>
</head>
<body>
    <header>
        <img class="logo" src="../assets/logo.svg" alt="logo">
        <section class="menu">
            <a href="../index.html">Home</a>
            <a href="motorcycles.html">Motorcycles</a>
            <a href="accesories.html">Accesories</a>
            <a href="us.html">Us</a>
            <a href="contact.html">Contact</a>
        </section>
    </header>
    <section class="title">
        <h1>Motorcycles</h1>
    </section>
    <div class="carousel-wrapper">
        <div class="carousel-track-container" id="track">
        <!-- slides injected por JS -->
        </div>
    
        <div class="controls">
        <button class="arrow-btn" id="prev" aria-label="Anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
    
        <div class="dots" id="dots"></div>
    
        <button class="arrow-btn" id="next" aria-label="Siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
        </div>
    </div>
    
    <script src="../js/motorcycles.js"></script>
</body>
</html>
